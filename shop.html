<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fostela Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">Fostela</div>
      <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="products">
    <h2>Our Apparel</h2>
    <div class="product-grid">
      <div class="product-card"><h3>Fostela T-Shirt</h3><p>R249.99</p></div>
      <div class="product-card"><h3>Fostela Hoodie</h3><p>R499.99</p></div>
      <div class="product-card"><h3>Fostela Cap</h3><p>R199.99</p></div>
      <div class="product-card"><h3>Fostela Golf Shirt</h3><p>R349.99</p></div>
      <div class="product-card"><h3>Fostela Bucket Hat</h3><p>R199.99</p></div>
    </div>
  </section>

  <footer>
    <p>© 2023 Fostela Branding & Apparel. All Rights Reserved.</p>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      hamburger.classList.toggle('active');
    });
  </script>
</body>
</html>
